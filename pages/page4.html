<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP Project - Gallery</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Preloader -->
    <div class="preloader">
      <div class="preloader-logo">
        <img src="../assets/logoCourse.svg" alt="Logo" />
      </div>
    </div>

    <!-- Navigation -->
    <nav class="main-nav">
      <a href="../index.html" class="nav-logo page-link">
        <img src="../assets/logoCourse.svg" alt="Logo course" width="80" height="80" />
      </a>

      <button class="burger-menu" aria-label="Menu">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>
    </nav>

    <!-- Menu déroulant -->
    <div class="menu-overlay"></div>
    <div class="dropdown-menu">
      <div class="dropdown-content">
        <a href="/pages/contexte.html" class="dropdown-link page-link">Pourquoi cette course ?</a>
        <a href="/index.html#parcours" class="dropdown-link page-link">Le circuit</a>
        <a href="/index.html" class="dropdown-link page-link">Les distances</a>
        <a href="/pages/page2.html" class="dropdown-link page-link">After party</a>
        <a href="/pages/page3.html" class="dropdown-link page-link">Bénévoles</a>
        <a href="/pages/page4.html" class="dropdown-link page-link">Photos</a>
      </div>
    </div>

    <div data-barba="wrapper">
      <main data-barba="container" data-barba-namespace="page4">
        <section class="construction-section">
          <div class="construction-content">
            <h1>Galerie photos en construction</h1>
            <p>On rassemble les meilleurs clichés de la course. La galerie sera disponible très bientôt.</p>
            <div class="construction-icons" aria-hidden="true">
              <span class="construction-icon">📷</span>
              <span class="construction-icon">🏃</span>
              <span class="construction-icon">🖼️</span>
            </div>
            <a href="../index.html" class="volunteers-button page-link">Retour à l'accueil</a>
          </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
          <p>&copy; 2026 GSAP Project. All rights reserved.</p>
        </footer>
      </main>
    </div>

    <!-- Load Animation Modules -->
    <script src="../lib/gsap.min.js"></script>
    <script src="../lib/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
    <script src="../js/animations/preloader.js"></script>
    <script type="module" src="../js/animations/pageTransition.js"></script>
    <script src="../js/animations/textReveal.js"></script>
    <script src="../js/animations/scrollAnimation.js"></script>
    <script src="../js/animations/customCursor.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
